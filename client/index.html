<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta name="description" content="Atlanta's premium beverage catering company. Alcohol catering, coffee bars, mocktail packages, wine tastings, hands-on mixology classes, and professional bartender training. Book your event today." />
    <meta name="keywords" content="mixology classes Atlanta, bartender training Atlanta, beverage catering, mobile bar service, alcohol catering, coffee catering, mocktail bar, wine tasting Atlanta, corporate event bar, wedding bar service" />
    <meta property="og:title" content="BevPro — Beverage Catering & Mixology Classes | Atlanta" />
    <meta property="og:description" content="Atlanta's mobile bar catering company. Alcohol catering, coffee bars, mocktail packages, wine tastings, hands-on mixology workshops, and professional bartender training for events of any size." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BevPro — Beverage Catering & Mixology Classes | Atlanta" />
    <meta name="twitter:description" content="Atlanta's go-to for bar catering and mixology classes. Alcohol, coffee, mocktails, wine tasting, bartender training — we bring the bar to you." />
    <link rel="canonical" href="https://mybevpro.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "BevPro",
        "description": "Premium beverage catering and mixology classes in Atlanta, GA. Alcohol catering, coffee bars, mocktail packages, wine tastings, hands-on mixology workshops, and professional bartender training.",
        "url": "https://mybevpro.com",
        "email": "hello@mybevpro.com",
        "telephone": "+1-404-555-1234",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Atlanta",
          "addressRegion": "GA",
          "addressCountry": "US"
        },
        "areaServed": {
          "@type": "GeoCircle",
          "geoMidpoint": {
            "@type": "GeoCoordinates",
            "latitude": 33.7490,
            "longitude": -84.3880
          },
          "geoRadius": "50000"
        },
        "priceRange": "$$",
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "09:00",
          "closes": "18:00"
        },
        "sameAs": [
          "https://www.groupon.com"
        ],
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "BevPro Services",
          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Alcohol Catering",
                "description": "Full bar service with premium spirits, craft cocktails, beer, and wine for events."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Coffee Catering",
                "description": "Artisanal espresso bar with professional baristas for morning events and late-night service."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Mocktail Packages",
                "description": "Craft zero-proof cocktails with fresh ingredients and house-made syrups."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Wine Tasting Experience",
                "description": "Guided wine tastings with curated flights and pairing notes."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Mixology Classes",
                "description": "Hands-on mixology workshops for team building, date nights, and social events in Atlanta."
              }
            }
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Bartender Training",
                "description": "Professional bartender training with guaranteed job placement and festival work experience in Atlanta."
              }
            }
          ]
        }
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
